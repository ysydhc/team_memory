  - id: plan-eval-devops-expert
    claude:
      name: plan-eval-devops-expert
      description: "运维专家。评审部署、可观测性、监控、灾备。"
      tools: [Read, Grep, Glob]
      disallowed_tools: [Edit, Write, Bash]
    cursor:
      name: plan-eval-devops-expert
      model: default
      description: "运维专家。评审部署、可观测性、监控、灾备。"
