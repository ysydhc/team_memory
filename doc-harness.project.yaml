# Doc-harness：项目层配置。维护约定与 rule_id 说明内嵌于 doc-health skill（.claude / .cursor）。
version: 1
project_id: team_memory

design_docs:
  root: docs
  index: docs/README.md

commands:
  doc_check: python scripts/harness_doc_gardening.py

whitelists:
  doc_gardening: scripts/doc-gardening-whitelist.txt

sync_reminders:
  - docs/README.md
  - README.md
  - AGENTS.md
