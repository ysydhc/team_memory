services:
  # ============================================================
  # PostgreSQL with pgvector extension
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: team_memory
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: devpass
    ports:
      # 主机 5433，避免与本机其他 PostgreSQL（如 Homebrew）占用 5432 冲突
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d team_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Ollama (local embedding + LLM) — optional profile
  # Only started when port 11434 is free (make setup skips if host already has Ollama).
  # Model is auto-pulled by docker-entrypoint.sh on first start.
  # ============================================================
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (optional: cache backend)
  # Only needed if cache.backend is set to "redis" in config
  # ============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # team_memory Web Application
  # ============================================================
  team-memory-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9111:9111"
    # 使用宿主机 ./src（置前于 site-packages），改代码后无需 rebuild 即可加载新路由
    volumes:
      - ./src:/app/live-src:ro
    environment:
      TEAM_MEMORY_DB_URL: "postgresql+asyncpg://developer:devpass@postgres:5432/team_memory"
      TEAM_MEMORY_DATABASE__URL: "postgresql+asyncpg://developer:devpass@postgres:5432/team_memory"
      TEAM_MEMORY_PG_HOST: "postgres"
      TEAM_MEMORY_WEB_HOST: "0.0.0.0"
      TEAM_MEMORY_WEB_PORT: "9111"
      PYTHONPATH: /app/live-src
      TEAM_MEMORY_API_KEY: "${TEAM_MEMORY_API_KEY:-changeme}"
      TEAM_MEMORY_USER: "${TEAM_MEMORY_USER:-admin}"
      RUN_MIGRATIONS: "true"
      # Ollama on the host: container localhost:11434 is NOT the host. Use host.docker.internal (see extra_hosts on Linux).
      TEAM_MEMORY_EMBEDDING__OLLAMA__BASE_URL: "http://host.docker.internal:11434"
      TEAM_MEMORY_EMBEDDING__OLLAMA__MODEL: "nomic-embed-text:latest"
      TEAM_MEMORY_LLM__BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["team-memory-web"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${TEAM_MEMORY_WEB_PORT:-9111}/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # team_memory MCP Server (stdio-based, for Cursor integration)
  # Uncomment if you want to run MCP server in a container.
  # Typically this is run locally for Cursor IDE integration.
  # ============================================================
  # team-memory-mcp:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   environment:
  #     TEAM_MEMORY_DB_URL: "postgresql+asyncpg://developer:devpass@postgres:5432/team_memory"
  #     TEAM_MEMORY_API_KEY: "${TEAM_MEMORY_API_KEY:-changeme}"
  #     TEAM_MEMORY_USER: "${TEAM_MEMORY_USER:-admin}"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: ["team-memory"]
  #   stdin_open: true
  #   tty: true

volumes:
  pgdata:
  ollama_data:
  redis_data:
