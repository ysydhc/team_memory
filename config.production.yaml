# ============================================================
# team_memory — 正式 / 预发环境
# ============================================================
# 启动：TEAM_MEMORY_ENV=production
# 必填环境变量示例：
#   TEAM_MEMORY_DATABASE_URL 或 TEAM_MEMORY_DATABASE__URL
#   TEAM_MEMORY_API_KEY
#   OLLAMA_BASE_URL（若使用 Ollama embedding）
#
# Docker / Helm：镜像内需同时包含 config.development.yaml 与本文件；
# entrypoint 通过 TEAM_MEMORY_ENV 选择其一。
# ============================================================

database:
  url: "${TEAM_MEMORY_DATABASE_URL}"

embedding:
  provider: ollama
  ollama:
    model: nomic-embed-text:latest
    base_url: "${OLLAMA_BASE_URL}"
    dimension: 768

llm:
  model: gpt-oss:120b-cloud
  base_url: "${OLLAMA_BASE_URL}"
  prompt_dir: null

extraction:
  quality_gate: 2
  max_retries: 1
  few_shot_examples: null

auth:
  type: db_api_key
  api_key: "${TEAM_MEMORY_API_KEY}"
  default_admin_password: "admin"

default_project: "default"

web:
  host: "0.0.0.0"
  port: 9111

retrieval:
  max_tokens: null
  max_count: 20
  trim_strategy: top_k
  top_k_children: 3
  min_avg_rating: 0.0
  rating_weight: 0.0
  summary_model: null

pageindex_lite:
  enabled: true
  only_long_docs: true
  min_doc_chars: 800
  max_tree_depth: 4
  max_nodes_per_doc: 40
  max_node_chars: 1200
  tree_weight: 0.15
  min_node_score: 0.01
  include_matched_nodes: true

search:
  mode: hybrid
  rrf_k: 60
  vector_weight: 0.7
  fts_weight: 0.3
  adaptive_filter: true
  score_gap_threshold: 0.15
  min_confidence_ratio: 0.6
  adaptive_min_keep: 3
  query_expansion_enabled: false
  query_expansion_timeout_seconds: 5

reranker:
  provider: none
  max_document_chars: 8000

cache:
  enabled: true
  backend: redis
  redis_url: "redis://redis:6379/0"
  ttl_seconds: 300
  max_size: 200
  embedding_cache_size: 500

lifecycle:
  dedup_on_save: true
  dedup_on_save_threshold: 0.90

vector:
  index_type: ivfflat
  hnsw_m: 16
  hnsw_ef_construction: 200
  hnsw_ef_search: 100

mcp:
  max_output_tokens: 4000
  truncate_solution_at: 2000

tag_synonyms: {}

# 档案附件上传：生产请挂卷到 root_dir，并按需 TEAM_MEMORY_UPLOADS__ENABLED 等覆盖
uploads:
  enabled: true
  # Mount a persistent volume at /data/uploads in production
  root_dir: "/data/uploads"
  max_bytes: 52428800
  allowed_extensions: [".md", ".txt", ".json", ".pdf"]

logging:
  log_io_enabled: false
  log_file_enabled: true
  # Mount a persistent volume at /data/logs in production
  log_file_path: "/data/logs/team_memory.log"
  log_file_backup_count: 10
  log_file_max_bytes: 52428800 # 50 MB

log_format: json
