daemon:
  host: "127.0.0.1"
  port: 3901

tm:
  mode: "local"
  base_url: "http://localhost:9111"
  user: "daemon"

obsidian:
  vaults:
    - path: "/Users/yeshouyou/Work/ad_learning"
      project: "ad_learning"
      exclude: [".obsidian", ".trash"]

projects:
  - name: "team_doc"
    path_patterns: ["team_doc"]
  - name: "ad_learning"
    path_patterns: ["ad_learning"]
  - name: "ai_learning"
    path_patterns: ["ai_learning"]

retrieval:
  session_start_top_k: 3
  keyword_triggers: ["之前", "上次", "经验", "踩坑", "遇到过"]

draft:
  max_age_minutes: 30
  db_path: "~/.cache/tm-pipeline/drafts.db"

refinement:
  enabled: true
  provider: "litellm"
  model: "GLM-5-Turbo"
  base_url: "http://localhost:4000/v1"
  api_key_env: "LITELLM_MASTER_KEY"
  timeout: 30
  scan_interval_seconds: 30
  max_input_chars: 6000
  max_retries: 1
  fallback_on_failure: true

evaluation:
  fuzzy_match_enabled: true
  fuzzy_match_threshold: 0.8
